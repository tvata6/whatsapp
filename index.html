<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WhatsApp Redirect</title>

  <script>
    // رقم الواتساب بدون +
    const phone = "905324328063";

    // الرسائل
    const messages = [
      "أنا مهتم بخدمات شركتكم السياحية في تركيا وأرغب بمعرفة التفاصيل",
      "هل توجد عروض سياحية للعائلات؟",
      "هل يمكنكم تزويدي ببرامج سياحية تشمل أهم المدن التركية؟",
      "هل تقدمون استقبال من المطار؟",
      "أريد حجز جولة داخل إسطنبول",
      "أودّ الاستفسار عن خدماتكم في تنظيم الرحلات داخل تركيا",
      "هل لديكم عروض أو باقات سياحية حاليًا يمكنني الاستفادة منها؟",
      "أرغب بالحصول على جدول سياحي مقترح يناسب العائلات",
      "أحتاج إلى برنامج سياحي شامل مع سائق خاص، هل هذا متوفر؟",
      "هل تقدمون حجوزات فنادق مع البرامج السياحية؟",
      "أبحث عن برنامج شهر عسل في تركيا، هل لديكم خيارات مناسبة؟"
    ];

    // اختيار رسالة عشوائية
    const randomMessage = messages[Math.floor(Math.random() * messages.length)];

    // تشفير الرسالة
    const encodedMessage = encodeURIComponent(randomMessage);

    // التحويل إلى واتساب
    window.location.href = `https://wa.me/${phone}?text=${encodedMessage}`;
  </script>

</head>
<body>
  <p>يتم تحويلك إلى واتساب...</p>
</body>
</html>
