<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <title>جاري التحويل إلى واتساب...</title>
    <meta name="robots" content="noindex">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VN2NM26S5R"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  gtag('js', new Date());

  gtag('config', 'G-VN2NM26S5R');
</script>
    
  </head>
  <body>
    <!-- هذا القسم مخفي افتراضيًا، ولا يظهر إلا إذا فشل التحويل التلقائي -->
    <div id="fallback" style="display:none">
      <p id="msg">يتم تحويلك إلى واتساب...</p>
      <p><a id="fallbackLink" href="#">اضغط هنا إذا لم يتم تحويلك تلقائيًا</a></p>
    </div>

    <script>
      // رقمك بدون +
      const phone = "905324328063";

      // الرسائل المتاحة
      const messages = [
        "أنا مهتم بخدمات شركتكم السياحية في تركيا وأرغب بمعرفة التفاصيل",
        "هل توجد عروض سياحية للعائلات؟",
        "هل يمكنكم تزويدي ببرامج سياحية تشمل أهم المدن التركية؟",
        "هل تقدمون استقبال من المطار؟",
        "أريد حجز جولة داخل إسطنبول",
        "أودّ الاستفسار عن خدماتكم في تنظيم الرحلات داخل تركيا",
        "هل لديكم عروض أو باقات سياحية حاليًا يمكنني الاستفادة منها؟",
        "أرغب بالحصول على جدول سياحي مقترح يناسب العائلات",
        "أحتاج إلى برنامج سياحي شامل مع سائق خاص، هل هذا متوفر؟",
        "هل تقدمون حجوزات فنادق مع البرامج السياحية؟",
        "أبحث عن برنامج شهر عسل في تركيا، هل لديكم خيارات مناسبة؟"
      ];

      // اختيار رسالة عشوائية مختلفة في كل زيارة
      const randomMessage = messages[Math.floor(Math.random() * messages.length)];
      const encodedMessage = encodeURIComponent(randomMessage);
      const waUrl = `https://wa.me/${phone}?text=${encodedMessage}`;
      
      // تسجيل حدث فتح واتساب في Google Analytics
// تجهيز الرابط الاحتياطي بنفس الرسالة
document.getElementById("fallbackLink").href = waUrl;

// قراءة معلومات الحملة من الرابط
const params = new URLSearchParams(window.location.search);
const source = params.get("utm_source") || "direct";
const medium = params.get("utm_medium") || "none";
const campaign = params.get("utm_campaign") || "unknown";

// منع التحويل أكثر من مرة
let redirected = false;

function openWhatsApp() {
  if (redirected) return;
  redirected = true;
  window.location.href = waUrl;
}

// تسجيل الحدث أولًا ثم فتح واتساب
if (typeof gtag === "function") {
  gtag("event", "whatsapp_open", {
    source: source,
    medium: medium,
    campaign: campaign,
    transport_type: "beacon",
    event_callback: openWhatsApp
  });

  // فتح واتساب حتى لو تأخر Google Analytics
  setTimeout(openWhatsApp, 700);
} else {
  openWhatsApp();
}

      // إذا لم يتم تحويل المتصفح فعليًا خلال ثانيتين (يحدث أحيانًا داخل
      // متصفح إنستغرام/فيسبوك الداخلي)، نظهر رسالة ورابط بديل يدوي
      setTimeout(function () {
        document.getElementById("fallback").style.display = "block";
      }, 2000);
    </script>
  </body>
</html>
